openapi: 3.0.3
info:
  title: Incomaker Commons v4
  version: 4.0.0
  description: Best-effort OpenAPI conversion from API Blueprint.
servers:
- url: https://commons.incomaker.com/v4
paths:
  /socialaccounts:
    get:
      summary: Get Accounts
      tags:
      - Social Accounts
      responses:
        '200':
          description: HTTP 200 response
        '400':
          description: HTTP 400 response
          content:
            application/json:
              schema:
                type: object
              example:
                error: Invalid parameters `type`
      parameters:
      - name: active
        in: query
        required: false
        schema:
          type: boolean
        example: 'true '
      - name: type
        in: query
        required: false
        schema:
          type: string
      - name: network
        in: query
        required: false
        schema:
          type: string
      - name: q
        in: query
        required: false
        schema:
          type: string
        description: Filter accounts by name.
      - name: limit
        in: query
        required: false
        schema:
          type: number
        example: '10'
        description: Maximum number of campaigns to return.
      - name: offset
        in: query
        required: false
        schema:
          type: number
        example: '0'
        description: Pagination offset.
      security:
      - bearerAuth: []
  /adaccounts/facebook:
    get:
      summary: Get Accounts for Facebook
      tags:
      - Ad Accounts
      responses:
        '200':
          description: HTTP 200 response
        '400':
          description: HTTP 400 response
          content:
            application/json:
              schema:
                type: object
              example:
                error: Invalid parameters `type`
      description: Fetch advertising accounts with filters for network, name or type.
      parameters:
      - name: socialaccount
        in: query
        required: true
        schema:
          type: string
        example: ffa27357
        description: facebook`s account id
      - name: limit
        in: query
        required: false
        schema:
          type: number
        example: '10'
        description: Maximum number of campaigns to return.
      - name: offset
        in: query
        required: false
        schema:
          type: number
        example: '0'
        description: Pagination offset.
      security:
      - bearerAuth: []
  /assets/email/generate:
    post:
      summary: Generate e-mail content (AI)
      tags:
      - Assets
      responses:
        '200':
          description: HTTP 200 response
          content:
            application/json:
              schema:
                type: string
              example: "+ result (object, required)\n\n    + subject (string, required)\n    + preheader (string)\n    + html\
                \ (string, required)\n    + text (string, required)\n\n+ meta (object, required)\n\n    + model (string, required)\n\
                \    + generatedAt (string, required, format: date-time)\n    + language (string, required)\n\n\n```json\n\
                {\n  \"result\": {\n    \"subject\": \"Výprodej zimní kolekce – doprava zdarma nad 1 500 Kč\",\n    \"preheader\"\
                : \"Zimní bundy, boty a doplňky se slevou. Nabídka platí omezenou dobu.\",\n    \"html\": \"<html><body><h1>Výprodej\
                \ zimní kolekce</h1><p>Doprava zdarma nad 1 500 Kč.</p><a href=\\\"{{ctaUrl}}\\\">Nakoupit se slevou</a></body></html>\"\
                ,\n    \"text\": \"Výprodej zimní kolekce. Doprava zdarma nad 1 500 Kč. Nakoupit se slevou: {{ctaUrl}}\"\n\
                \  },\n  \"meta\": {\n    \"model\": \"loreana\",\n    \"generatedAt\": \"2026-01-30T14:00:00Z\",\n    \"\
                language\": \"cs\"\n  }\n}\n```"
        '400':
          description: HTTP 400 response
          content:
            application/json:
              schema:
                type: string
              example: "```json\n{\n  \"error\": \"Invalid parameters: missing language or inputs.brief\"\n}\n```"
        '403':
          description: HTTP 403 response
          content:
            application/json:
              schema:
                type: string
              example: "```json\n{\n  \"error\": \"You don’t have permission to generate AI content.\"\n}\n```"
        '422':
          description: HTTP 422 response
          content:
            application/json:
              schema:
                type: string
              example: "```json\n{\n  \"error\": \"Unable to generate content\",\n  \"details\": {\n    \"reason\": \"prompt_too_long\"\
                \n  }\n}\n```"
      description: Generate draft email content (subject, optional preheader, HTML body and plain-text version) using AI based
        on campaign context, target audience, selected products and custom instructions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: string
            example: "+ language: `cs` (string, required) - ISO 639-1 language code of the output\n+ tone: `sales` (string,\
              \ optional) - Desired tone/style (e.g. sales, friendly, urgent, informational)\n+ context (object, required)\n\
              \n    + campaignId: `c_1001` (string, required)\n    + campaignType: `onetime` (string, required)\n    + channel:\
              \ `email` (string, required)\n\n+ audience (object, required)\n\n    + audienceId: `0469ab2c-9ee4-4923-a470-9fbebbbb5252`\
              \ (string, required) - UUID of the target audience/segment\n\n+ products (object, optional)\n\n    + productIds\
              \ (array[number], optional) - List of product IDs from the e-commerce catalog\n    + limit: `6` (number, optional)\
              \ - Max number of products to reference/include\n\n+ constraints (object, optional)\n\n    + maxSubjectLength:\
              \ `55` (number, optional) - Maximum allowed length of subject line\n    + includePreheader: `true` (boolean,\
              \ optional) - Whether to generate preheader text\n\n+ inputs (object, required)\n\n    + brief: `Výprodej zimní\
              \ kolekce, zdůraznit dopravu zdarma nad 1 500 Kč. CTA: Nakoupit se slevou.` (string, required) - Main instruction\
              \ and copy direction for the AI\n    + brandName: `Incomaker Shop` (string, optional) - Brand name to use in\
              \ the copy\n\n\n    ```json\n    {\n      \"language\": \"cs\",\n      \"tone\": \"sales\",\n      \"context\"\
              : {\n        \"campaignId\": \"c_1001\",\n        \"campaignType\": \"onetime\",\n        \"channel\": \"email\"\
              \n      },\n      \"audience\": {\n        \"audienceId\": \"0469ab2c-9ee4-4923-a470-9fbebbbb5252\"\n      },\n\
              \      \"products\": {\n        \"productIds\": [412458425, 412458426, 412458427],\n        \"limit\": 6\n \
              \     },\n      \"constraints\": {\n        \"maxSubjectLength\": 55,\n        \"includePreheader\": true\n\
              \      },\n      \"inputs\": {\n        \"brief\": \"Výprodej zimní kolekce, zdůraznit dopravu zdarma nad 1\
              \ 500 Kč. CTA: Nakoupit se slevou.\",\n        \"brandName\": \"Incomaker Shop\"\n      }\n    }\n    ```"
  /audiences:
    get:
      summary: Get Audiences
      tags:
      - Audiences
      responses:
        '200':
          description: HTTP 200 response
        '400':
          description: HTTP 400 response
          content:
            application/json:
              schema:
                type: object
              example:
                error: Invalid parameters `type`
      description: Fetch audiences by type, with filters for name, date range, and category.
      parameters:
      - name: type
        in: query
        required: false
        schema:
          type: string
        example: incomaker
      - name: state
        in: query
        required: false
        schema:
          type: string
        example: paused,invalid
      - name: q
        in: query
        required: false
        schema:
          type: string
        example: hollydays
        description: Filter audiences by name.
      - name: limit
        in: query
        required: false
        schema:
          type: number
        example: '20 '
        description: Maximum number of campaigns to return.
      - name: offset
        in: query
        required: false
        schema:
          type: number
        example: '5 '
        description: Pagination offset.
      security:
      - bearerAuth: []
  /campaigns:
    get:
      summary: Get campaigns
      tags:
      - Campaigns
      responses:
        '200':
          description: HTTP 200 response
          content:
            application/json:
              schema:
                type: string
              example: '+ campaigns (array[Campaign], required)

                + paging (Paging, required)'
        '400':
          description: HTTP 400 response
          content:
            application/json:
              schema:
                type: object
              example:
                error: Invalid parameters
      description: Fetch campaigns by type, with filters for name, date range, and category.
      parameters:
      - name: categoryId
        in: query
        required: false
        schema:
          type: number
        example: '10'
        description: The ID of the category to filter campaigns.
      - name: channel
        in: query
        required: false
        schema:
          type: string
      - name: q
        in: query
        required: false
        schema:
          type: string
        example: christmass
        description: Filter campaigns by name.
      - name: type
        in: query
        required: false
        schema:
          type: string
        example: onetime
        description: Filter campaigns by type
      - name: state
        in: query
        required: false
        schema:
          type: string
      - name: search
        in: query
        required: false
        schema:
          type: string
      - name: dateFrom
        in: query
        required: true
        schema:
          type: string
        example: '2025-05-15'
        description: Start date filter
      - name: dateTo
        in: query
        required: true
        schema:
          type: string
        example: '2025-05-25'
        description: End date filter
      - name: limit
        in: query
        required: false
        schema:
          type: number
        example: '10'
        description: Maximum number of campaigns to return.
      - name: offset
        in: query
        required: false
        schema:
          type: number
        example: '5'
        description: Pagination offset.
      security:
      - bearerAuth: []
  /campaigns/{campaignId}/archive:
    post:
      summary: Archive Campaign
      tags:
      - Campaigns
      responses:
        '200':
          description: HTTP 200 response
        '400':
          description: HTTP 400 response
          content:
            application/json:
              schema:
                type: object
              example:
                error: Campaign not found
      description: Move a campaign to the archived list.
      parameters:
      - name: campaignId
        in: path
        required: true
        schema:
          type: string
        description: Unique identifier of the campaign.
      security:
      - bearerAuth: []
  /campaigns/{campaignId}/{action}:
    post:
      summary: Pause/Resume/Cancel Campaign
      tags:
      - Campaigns
      responses:
        '200':
          description: HTTP 200 response
        '400':
          description: HTTP 400 response
          content:
            application/json:
              schema:
                type: object
              example:
                error: Action not allowed
      description: Change a campaign’s running state. Replace `{action}` with `pause`, `resume`, or `cancel`.
      parameters:
      - name: campaignId
        in: path
        required: true
        schema:
          type: string
        description: Unique identifier of the campaign.
      - name: action
        in: path
        required: true
        schema:
          type: string
        description: Action to perform (`pause`, `resume`, `cancel`).
      security:
      - bearerAuth: []
  /campaigns/{campaignId}/rename:
    put:
      summary: Rename Campaign
      tags:
      - Campaigns
      responses:
        '200':
          description: HTTP 200 response
        '404':
          description: HTTP 404 response
      description: Rename an existing campaign.
      parameters:
      - name: campaignId
        in: path
        required: true
        schema:
          type: string
        description: Unique identifier of the campaign.
      security:
      - bearerAuth: []
  /campaigns/{campaignId}/duplicate:
    post:
      summary: Duplicate Campaign
      tags:
      - Campaigns
      responses:
        '200':
          description: HTTP 200 response
        '404':
          description: HTTP 404 response
      description: Clone an existing campaign.
      parameters:
      - name: campaignId
        in: path
        required: true
        schema:
          type: string
        description: Unique identifier of the campaign.
      security:
      - bearerAuth: []
  /campaigns/{campaignId}:
    delete:
      summary: Delete Campaign
      tags:
      - Campaigns
      responses:
        '200':
          description: HTTP 200 response
        '404':
          description: HTTP 404 response
      description: Remove a campaign permanently.
      parameters:
      - name: campaignId
        in: path
        required: true
        schema:
          type: string
        description: Unique identifier of the campaign.
      security:
      - bearerAuth: []
  /campaigns/categories:
    get:
      summary: Get Categories
      tags:
      - Campaigns
      responses:
        '200':
          description: HTTP 200 response
          content:
            application/json:
              schema:
                type: string
              example: '"categoryId": "1",

                "name": "Category 1",

                "color": "#FF0000"

                "categoryId": "2",

                "name": "Category 2",

                "color": "#00FF00"'
