    Contact:
      type: object
      properties:
        clientContactId:
          type: string
          example: '1245451254'
          description: Unique identifier of contact in client's system
        firstName:
          type: string
          example: John
          description: Contact`s first name
        lastName:
          type: string
          example: Doe
          description: Contact`s last name
        titleBefore:
          type: string
          example: Prof.
          description: Contact`s title before name
        titleAfter:
          type: string
          example: Ph.D.
          description: Contact`s title after name
        formalSalutation:
          type: string
          example: Dear Mr. Doe
          description: 'Contact''s formal salutation: e.g. Dear Mr. Smith'
        informalSalutation:
          type: string
          example: Dear John
          description: 'Contact''s informal salutation: e.g. Dear Mr. Smith'
        company:
          type: string
          example: Incomaker s.r.o.
          description: Contact's company
        position:
          type: string
          example: CEO
          description: Contact's position in the company
        personalId:
          type: string
          example: '75876549203'
          description: Contact`s personal ID - e.g. passport, ID card
        consentDate:
          type: string
          example: '2018-05-30T13:00:00+02:00'
          description: ISO 8601 formatted date-time of gaining consent
        contactSource:
          type: string
          example: Pop-up
          description: Technical source of the contact
        clientContactCreated:
          type: string
          example: '2018-05-30T13:00:00+02:00'
          description: ISO 8601 formatted date-time when the contact was created in the source system (note that there is
            also a read only parameter "created", which means when the contact was created in Incomaker)
        email:
          type: string
          example: info@incomaker.com
          description: Contact`s email
        phoneNumber1:
          type: string
          example: '87639642'
          description: Contact's phone number - Phone
        phoneNumber2:
          type: string
          example: '76590824502'
          description: 'Contact`s mobile number - Phone #2'
        street:
          type: string
          example: Argentinska
          description: Contact`s street
        street2:
          type: string
          example: '38'
          description: Contact`s street 2
        city:
          type: string
          example: Praha
          description: Contact`s city
        postalCode:
          type: string
          example: '17000'
          description: Contact`s postal code
        region:
          type: string
          example: Praha
          description: Contact`s region
        country:
          type: string
          example: CZ
          description: Contact`s country ISO 3166-1 alpha-2
        language:
          type: string
          example: cs
          description: Contact`s language ISO 639-1
        birthday:
          type: string
          example: '2018-05-30'
          description: Contact`s birthday ISO 8601 formatted date
        location:
          type: object
          properties:
            latitude:
              type: number
              example: 50.0820343
              description: Contact`s latitude
            longitude:
              type: number
              example: 14.4008503
              description: Contact`s longitude
        pricelist:
          type: string
          example: End user
          description: Contact`s pricelist (it can be used for assigning correct prices)
        remarks:
          type: string
          example: Nothing special for this contact
          description: Contact`s remarks
        tags:
          type: array
          items:
            type: string
          description: Tags assigned to the contact.
        fields:
          type: object
          description: Contact`s custom fields JSON
          additionalProperties:
            type: string
        lists:
          type: array
          items:
            type: string
          description: In which mailing lists is the contact. If the list doesn`t exist, it will be created.
    Paging:
      type: object
      properties:
        offset:
          type: number
          example: 21
          description: Start item on the current page
        limit:
          type: number
          example: 40
          description: Number of items on the current page
        totalItems:
          type: number
          example: 100
          description: Total number of items
        totalPages:
          type: number
          example: 5
          description: Total number of pages
        links:
          type: array
          properties:
            href:
              type: string
              example: ?offset=40&limit=60
              description: Link to the page
            rel:
              example: next
              description: Link type
              type: string
              enum:
              - next
              - prev
      description: Pagination information.
    TeaserSettings:
      type: object
      properties:
        position:
          type: object
          properties:
            default:
              type: string
              example: bottomLeft
            positions:
              type: array
              items:
                $ref: '#/components/schemas/TeaserPosition'
          required:
          - positions
        fontFamily:
          type: object
          properties:
            default:
              type: string
              example: Times New Roman
            fontFamilies:
              type: array
              items:
                $ref: '#/components/schemas/TeaserFontFamily'
          required:
          - fontFamilies
        fontWeight:
          type: object
          properties:
            default:
              type: string
              example: normal
            fontWeights:
              type: array
              items:
                $ref: '#/components/schemas/TeaserFontWeight'
          required:
          - fontWeights
        fontSize:
          type: object
          properties:
            default:
              type: string
              example: 16 px
    WebsiteSettings:
      type: object
      properties:
        timezone:
          type: string
          example: Europe/Prague
          description: IANA timezone identifier.
        defaultLanguage:
          type: string
          example: cs
          description: Default language code (ISO 639-1).
        defaultCurrency:
          type: string
          example: CZK
          description: Default currency (ISO 4217).
        dateFormat:
          type: string
          example: YYYY-MM-DD
          description: Display format for dates.
        numberFormat:
          type: string
          example: 1 234,56
          description: Display format for numbers.
        createdAt:
          type: string
          example: '2025-01-10T09:32:15Z'
          description: ISO 8601 timestamp.
        updatedAt:
          type: string
          example: '2025-05-15T10:00:00Z'
          description: ISO 8601 timestamp.
        languages:
          type: array
          items:
            type: string
        currencies:
          type: array
          items:
            type: string
