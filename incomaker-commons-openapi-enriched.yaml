      - action_unsubscribe
      - action_webhook
      - target_abtest
      - target_condition
      - target_filter
      - target_merge
      - target_split
      - target_splitter
      - trigger_birthday
      - trigger_campaign_sent
      - trigger_cart_abandon
      - trigger_cart_add
      - trigger_cart_product_discount
      - trigger_cart_product_in_stock
      - trigger_cart_product_low_stock
      - trigger_checkout_visited
      - trigger_contact_lists_contact_add
      - trigger_contact_lists_contact_remove
      - trigger_custom_event
