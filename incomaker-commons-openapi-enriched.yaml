          description: HTTP 200 response
        '403':
          description: HTTP 403 response
      description: 'Returns the number of **contacts** having the given tag.

        > Tags are universal, but this endpoint is contact-specific.'
      parameters:
      - name: tagRef
        in: path
        required: true
        schema:
          type: string
        example: '123'
        description: Tag ID or tag name.
      security:
      - bearerAuth: []
  /tags/contacts/count:
    get:
      summary: Get contact counts for all tags (grouped by category)
      tags:
      - Tags
      responses:
        '200':
          description: HTTP 200 response
          content:
            application/json:
              schema:
                type: string
              example: "{\n  \"categoryId\": 1,\n  \"categoryName\": \"Marketing\",\n  \"tags\": [\n{ \"tagId\": 10, \"tagName\"\
                : \"VIP\", \"count\": 123 },\n{ \"tagId\": 11, \"tagName\": \"Returning\", \"count\": 0 }\n  ]\n},\n{\n  \"\
                categoryId\": 2,\n  \"categoryName\": \"Internal\",\n  \"tags\": [\n{ \"tagId\": 12, \"tagName\": \"AbandonedCart\"\
                , \"count\": 45 }\n  ]\n}\n\"tags\": [\n  { \"tagId\": 13, \"tagName\": \"NoCategoryTag\", \"count\": 7 }\n\
                ]"
        '403':
          description: HTTP 403 response
      description: 'Returns contact counts for all tags in the plugin, including category structure for UI rendering.

        > Tags are universal, but this endpoint is contact-specific.'
      security:
      - bearerAuth: []
  /tags/bulk:
    post:
      summary: Create Tags (bulk)
      tags:
      - Tags
      responses:
        '207':
          description: HTTP 207 response
          content:
            application/json:
              schema:
                type: string
              example: "{\n  \"index\": 0,\n  \"status\": 201,\n  \"tag\": {\n\"id\": 10,\n\"name\": \"VIP\",\n\"description\"\
                : \"High value clients\",\n\"category\": { \"id\": 1, \"name\": \"Marketing\" }\n  }\n},\n{\n  \"index\":\
                \ 1,\n  \"status\": 400,\n  \"error\": {\n\"error\": \"Provide exactly one of 'categoryId' or 'categoryName'.\"\
                \n  }\n},\n{\n  \"index\": 2,\n  \"status\": 404,\n  \"error\": {\n\"error\": \"Category not found\"\n  }\n\
                },\n{\n  \"index\": 3,\n  \"status\": 409,\n  \"error\": {\n\"error\": \"Tag name already exists\",\n\"field\"\
                : \"name\",\n\"value\": \"VIP\"\n  }\n}"
        '413':
          description: HTTP 413 response
        '400':
          description: HTTP 400 response
      description: 'Create multiple tags at once.

        **Limit:** maximum `100` tags per request.

        For each item, provide **exactly one** of `categoryId` or `categoryName`.'
      security:
      - bearerAuth: []
  /tags/categories:
    get:
      summary: Get Tag categories
      tags:
      - Tags
      responses:
        '200':
          description: HTTP 200 response
          content:
            application/json:
              schema:
                type: string
              example: '+ categories (array[TagCategory])

                + paging (Paging)'
        '400':
          description: HTTP 400 response
      description: Fetch tag categories with optional name filter.
      parameters:
      - name: q
        in: query
        required: false
        schema:
          type: string
        example: Marketing
        description: Filter categories by name.
      - name: limit
        in: query
        required: false
        schema:
          type: number
        example: '10'
      - name: offset
        in: query
        required: false
        schema:
          type: number
        example: '0'
      security:
      - bearerAuth: []
    post:
      summary: Create Tag category
      tags:
      - Tags
      responses:
        '201':
          description: HTTP 201 response
        '409':
          description: HTTP 409 response
        '400':
          description: HTTP 400 response
      description: Create a new tag category.
      security:
      - bearerAuth: []
  /tags/categories/{categoryRef}:
    get:
      summary: Get Tag category
      tags:
      - Tags
      responses:
        '200':
          description: HTTP 200 response
        '404':
          description: HTTP 404 response
      description: 'Retrieve a single category by ID or by name.

        **`categoryRef` rules:**

        - If `categoryRef` is numeric, it is treated as category `id`.

        - Otherwise it is treated as the **category name** (URL-encoded).'
      parameters:
      - name: categoryRef
        in: path
        required: true
        schema:
          type: string
        example: '1'
        description: Category ID or category name.
      security:
      - bearerAuth: []
    put:
      summary: Update Tag category
      tags:
      - Tags
      responses:
        '200':
          description: HTTP 200 response
        '409':
          description: HTTP 409 response
        '404':
          description: HTTP 404 response
        '400':
          description: HTTP 400 response
      description: 'Update category fields by ID or by name.

        > A duplicate name can only happen when **changing** the name to one already used by a **different** category.'
      parameters:
      - name: categoryRef
        in: path
        required: true
        schema:
          type: string
        example: '1'
        description: Category ID or category name.
      security:
      - bearerAuth: []
    delete:
      summary: Delete Tag category
      tags:
      - Tags
      responses:
        '204':
          description: HTTP 204 response
        '409':
          description: HTTP 409 response
      description: Delete a category by ID or by name.
      parameters:
      - name: categoryRef
        in: path
        required: true
        schema:
          type: string
        example: '1'
        description: Category ID or category name.
      security:
      - bearerAuth: []
  /tags/categories/bulk:
    post:
      summary: Create Tag categories (bulk)
      tags:
      - Tags
      responses:
        '207':
          description: HTTP 207 response
          content:
            application/json:
              schema:
                type: string
              example: "+ results (array)\n    + (object)\n        + index: 0 (number)\n        + status: 201 (number)\n \
                \       + category (TagCategory, optional)\n        + error (object, optional)"
        '413':
          description: HTTP 413 response
        '400':
          description: HTTP 400 response
      description: 'Create multiple categories at once.

        **Limit:** maximum `100` categories per request.'
      security:
      - bearerAuth: []
  /context:
    get:
      summary: Get Context
      tags:
      - Context
      responses:
        '200':
          description: HTTP 200 response
        '401':
          description: HTTP 401 response
      description: Retrieve current context settings.
      security:
      - bearerAuth: []
    post:
      summary: Update Context
      tags:
      - Context
      responses:
        '200':
          description: HTTP 200 response
        '400':
          description: HTTP 400 response
      description: Update context settings. This endpoint merges the provided data with the existing context.
      security:
      - bearerAuth: []
    put:
      summary: Replace Context
      tags:
      - Context
      responses:
        '200':
          description: HTTP 200 response
        '400':
          description: HTTP 400 response
      description: Replace the entire context with new settings.
      security:
      - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    TargetField:
      type: string
      enum:
      - url
      - referrerUrl
      - utmSource
      - utmMedium
      - utmCampaign
      - device
      - cookie
      - selector
      - selectorClick
    TargetMatchType:
      type: string
      enum:
      - equals
      - not_equals
      - contains
      - not_contains
      - starts_with
      - ends_with
      - regex
    TargetOperator:
      type: string
      enum:
      - AND
      - OR
    TargetCondition:
      type: object
      properties:
        field:
          $ref: '#/components/schemas/TargetField'
          description: Which field to evaluate.
        match:
          $ref: '#/components/schemas/TargetMatchType'
          description: How to compare the field value against `value`.
        value:
          type: string
          example: /products
          description: The expected value to match against.
      required:
      - field
      - match
      - value
      description: A single condition that evaluates one field against one value.
    TargetGroup:
      type: object
      properties:
        operator:
          $ref: '#/components/schemas/TargetOperator'
          description: Logical operator applied to all items in `conditions`.
        conditions:
          type: array
          description: 'Array of `TargetCondition` objects and/or nested `TargetGroup` objects. Minimum 1 item. Maximum nesting
            depth: 3 levels. Maximum total nodes across the entire tree: 50.'
      required:
      - operator
      - conditions
      description: A logical group that combines conditions (and/or nested groups) using AND or OR.
    TargetNode:
      oneOf:
      - $ref: '#/components/schemas/TargetCondition'
      - $ref: '#/components/schemas/TargetGroup'
    Target:
      allOf:
      - $ref: '#/components/schemas/TargetGroup'
      description: Target defines the conditions under which a trigger activates.
      example:
        operator: AND
        conditions:
        - field: url
          match: contains
          value: /products
        - operator: OR
          conditions:
          - field: utmSource
            match: equals
            value: google
          - field: utmSource
            match: equals
            value: facebook
    Error:
      type: object
      properties:
        error:
          type: string
    ActivityType:
      type: string
      enum:
      - action_audience_meta
      - action_audience_sklik
      - action_contact_lists_contact_add
      - action_contact_lists_contact_remove
      - action_contact_tag_add
      - action_contact_tag_remove
      - action_contact_update
      - action_delay
      - action_email
      - action_nps
      - action_popup
      - action_sms
